<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comment Relevancy Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --surface-border: rgba(255, 255, 255, 0.1);
            --primary-gradient: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --input-bg: rgba(15, 23, 42, 0.6);
            --glass-blur: blur(12px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.15), transparent 25%);
            background-attachment: fixed;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Typography */
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-weight: 400;
        }

        /* Layout */
        .layout-grid {
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 2rem;
            align-items: start;
        }

        @media (max-width: 1024px) {
            .layout-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Glass Surface */
        .glass-panel {
            background: var(--surface-color);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--surface-border);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* Forms */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        input[type="text"], 
        input[type="number"], 
        select, 
        textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--surface-border);
            color: var(--text-main);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
            line-height: 1.5;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        /* Toggle Switch */
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--input-bg);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--surface-border);
        }
        
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.1);
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background: var(--primary-gradient);
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        /* Button */
        button.btn-primary {
            width: 100%;
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        button.btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4);
        }

        button.btn-primary:active {
            transform: translateY(0);
        }

        /* Results Area */
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--surface-border);
            padding-bottom: 1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--input-bg);
            border: 1px solid var(--surface-border);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.25rem;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Comment Cards */
        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .comment-card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid var(--surface-border);
            border-radius: 12px;
            padding: 1.25rem;
            transition: transform 0.2s ease;
        }

        .comment-card:hover {
            transform: translateX(4px);
            background: rgba(30, 41, 59, 0.6);
        }

        .comment-card.relevant {
            border-left: 4px solid var(--success);
        }

        .comment-card.irrelevant {
            border-left: 4px solid var(--surface-border);
            opacity: 0.6;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .badge.success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .badge.neutral {
            background: rgba(148, 163, 184, 0.1);
            color: var(--text-muted);
        }

        .score-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--input-bg);
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-family: monospace;
            color: var(--accent);
            border: 1px solid var(--surface-border);
        }

        .comment-text {
            color: var(--text-main);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* Loader */
        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .placeholder-text {
            color: var(--text-muted);
            text-align: center;
            padding: 3rem 0;
            font-size: 1.1rem;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Comment Relevancy Engine</h1>
        <p class="subtitle">AI-powered semantic filtering and reranking for forum comments</p>
    </header>

    <div class="layout-grid">
        <!-- Input Panel -->
        <div class="glass-panel">
            <form id="rankForm">
                <div class="form-group">
                    <label for="question">Target Question</label>
                    <input type="text" id="question" value="What is the best strategy to defeat the Elden Beast?" required>
                </div>

                <div class="form-group">
                    <label for="context">Reference Context (Optional, helps guide AI)</label>
                    <textarea id="context" rows="3">Use bleed builds, avoid Holy damage, dodge the constellation attack sideways.</textarea>
                </div>

                <div class="form-group">
                    <label for="comments">Comments (One per line)</label>
                    <textarea id="comments" rows="6" required>Use Rivers of Blood katana for bleed damage.
Git gud lmao
This game is trash compared to Dark Souls 3.
Black Flame incantations deal massive percentage damage.
I gave up and watched it on youtube.
Stay at medium load for fast rolls, and run sideways from the holy beam.</textarea>
                </div>

                <div class="input-row">
                    <div class="form-group">
                        <label for="model">Bi-Encoder Model</label>
                        <select id="model">
                            <option value="multi-qa-MiniLM-L6-cos-v1" selected>multi-qa-MiniLM-L6 (Best)</option>
                            <option value="all-mpnet-base-v2">all-mpnet-base-v2</option>
                            <option value="all-MiniLM-L6-v2">all-MiniLM-L6-v2 (Fast)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="threshold">Threshold</label>
                        <input type="number" id="threshold" min="0" max="1" step="0.05" value="0.30">
                    </div>
                </div>

                <div class="form-group toggle-container">
                    <div>
                        <label style="margin-bottom: 0;">Cross-Encoder Reranking</label>
                        <small style="color: var(--text-muted); font-size: 0.75rem;">Improves accuracy, slower</small>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="useCrossEncoder" checked>
                        <span class="slider"></span>
                    </label>
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">
                    <i class="fas fa-layer-group"></i> Analyze Comments
                    <div class="loader" id="loader"></div>
                </button>
            </form>
        </div>

        <!-- Results Panel -->
        <div class="glass-panel" style="min-height: 500px;">
            <div class="results-header">
                <h2>Results Analysis</h2>
                <span class="badge neutral" id="modelBadge"><i class="fas fa-microchip"></i> Ready</span>
            </div>

            <div id="resultsContent">
                <div class="placeholder-text">
                    <i class="fas fa-robot" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;"></i>
                    <p>Enter a question and comments, then click Analyze.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('rankForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const resultsContent = document.getElementById('resultsContent');
        const modelBadge = document.getElementById('modelBadge');
        const icon = btn.querySelector('i');

        // Extract inputs
        const question = document.getElementById('question').value;
        const context = document.getElementById('context').value;
        const commentsText = document.getElementById('comments').value;
        const comments = commentsText.split('\n').map(c => c.trim()).filter(c => c.length > 0);
        const model = document.getElementById('model').value;
        const threshold = parseFloat(document.getElementById('threshold').value);
        const useCrossEncoder = document.getElementById('useCrossEncoder').checked;

        if (comments.length === 0) {
            alert('Please provide at least one comment.');
            return;
        }

        // Loading state
        icon.style.display = 'none';
        loader.style.display = 'block';
        btn.disabled = true;
        
        try {
            const response = await fetch('/rank', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    question,
                    context,
                    comments,
                    threshold,
                    top_k: 50,
                    model,
                    use_cross_encoder: useCrossEncoder
                })
            });

            if (!response.ok) {
                throw new Error(`API Error: ${response.statusText}`);
            }

            const data = await response.json();
            renderResults(data);
            
            // Update badge
            modelBadge.innerHTML = `<i class="fas fa-check-circle"></i> ${data.model} ${useCrossEncoder ? '+ Reranker' : ''}`;
            modelBadge.className = 'badge success';

        } catch (error) {
            resultsContent.innerHTML = `<div class="placeholder-text" style="color: var(--danger)">
                <i class="fas fa-exclamation-triangle" style="font-size: 2rem; margin-bottom: 1rem;"></i>
                <p>Failed to analyze. Ensure the API is running.</p>
                <small>${error.message}</small>
            </div>`;
        } finally {
            // Restore state
            icon.style.display = 'inline-block';
            loader.style.display = 'none';
            btn.disabled = false;
        }
    });

    function renderResults(data) {
        let html = `
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value">${data.total_comments}</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color: var(--success)">${data.relevant_count}</div>
                    <div class="stat-label">Relevant</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color: var(--text-muted)">${data.irrelevant_count}</div>
                    <div class="stat-label">Ignored</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color: #60a5fa">${data.processing_time_ms}ms</div>
                    <div class="stat-label">Latency</div>
                </div>
            </div>
            <div class="comment-list">
        `;

        data.results.forEach(res => {
            const isRel = res.is_relevant;
            const badgeClass = isRel ? 'success' : 'neutral';
            const badgeIcon = isRel ? 'fa-check' : 'fa-times';
            const badgeText = isRel ? 'Relevant' : 'Irrelevant';
            
            // Highlight matching logic
            let scorePills = `<span class="score-pill" title="Bi-Encoder Search Score"><i class="fas fa-search"></i> ${res.score.toFixed(3)}</span>`;
            if (res.cross_encoder_score !== null) {
                scorePills += `<span class="score-pill" title="Cross-Encoder Rerank Score" style="color: #ec4899; border-color: rgba(236, 72, 153, 0.3)"><i class="fas fa-sort-amount-up"></i> ${res.cross_encoder_score.toFixed(3)}</span>`;
            }

            html += `
                <div class="comment-card ${isRel ? 'relevant' : 'irrelevant'}">
                    <div class="comment-header">
                        <span class="badge ${badgeClass}"><i class="fas ${badgeIcon}"></i> ${badgeText}</span>
                        <div>${scorePills}</div>
                    </div>
                    <div class="comment-text">
                        ${res.comment}
                    </div>
                </div>
            `;
        });

        html += `</div>`;
        document.getElementById('resultsContent').innerHTML = html;
    }
</script>

</body>
</html>
